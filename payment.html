<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rideit | Payment</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="/" class="brand"><span class="brand-logo">🚲</span><span class="brand-text">Rideit</span></a>
            <nav class="nav" id="primaryNav">
                <a href="dashboard.html">Dashboard</a>
                <a href="rides.html">Rides</a>
                <a href="profile.html">Profile</a>
            </nav>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>
        </div>
    </header>

    <main class="section">
        <div class="container">
            <h1 class="section-title">Complete Payment</h1>
            <div class="steps" style="margin-bottom:16px">
                <div class="step"><div class="step-icon">💳</div><h3>UPI</h3><p>PhonePe • Google Pay • Paytm</p><a class="btn btn-solid" href="#">Pay with UPI</a></div>
                <div class="step"><div class="step-icon">🏦</div><h3>Card</h3><p>Debit • Credit • Rupay</p><a class="btn btn-outline" href="#">Pay with Card</a></div>
                <div class="step"><div class="step-icon">👛</div><h3>Wallet</h3><p>Add money and auto-pay</p><a class="btn btn-outline" href="#">Use Wallet</a></div>
                <div class="step"><div class="step-icon">🏷️</div><h3>Coupon</h3><p>Apply discount code</p><a class="btn btn-outline" href="#">Apply Code</a></div>
            </div>
            <div class="center">
                <a class="btn btn-solid" href="#">Pay ₹ 89.00</a>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
